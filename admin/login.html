<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZYVERION Admin Login</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-wrap">
    <div class="admin-card">
      <h1>ZYVERION Admin</h1>
      <p class="muted">Sign in to access your dashboard.</p>

      <form id="loginForm">
        <label>Email</label>
        <input type="email" id="email" required placeholder="you@zyverion.com" />

        <label>Password</label>
        <input type="password" id="password" required placeholder="Your password" />

        <button type="submit" id="loginBtn">Sign In</button>
        <p id="loginStatus" class="muted"></p>
      </form>
    </div>
  </div>

  <script type="module" src="admin.js?v=1"></script>
</body>
</html>
