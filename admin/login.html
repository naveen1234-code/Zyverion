<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZYVERION Admin Login</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-body admin-login-body">
  <div class="admin-bg">
    <div class="admin-bg-orb orb-1"></div>
    <div class="admin-bg-orb orb-2"></div>
    <div class="admin-bg-orb orb-3"></div>
    <div class="admin-grid-overlay"></div>
  </div>

  <main class="admin-login-shell">
    <section class="admin-login-panel">
      <div class="admin-login-brand">
        <div class="admin-brand-icon">Z</div>
        <div class="admin-login-brand-copy">
          <span class="admin-brand-label">ZYVERION</span>
          <h1>Admin Access</h1>
        </div>
      </div>

      <p class="admin-login-subtitle">
        Sign in to access your dashboard, manage leads, track revenue, and control your business pipeline.
      </p>

      <form id="loginForm" class="admin-login-form">
        <label for="email" class="admin-field-label">Email</label>
        <input
          type="email"
          id="email"
          required
          placeholder="you@zyverion.com"
        />

        <label for="password" class="admin-field-label">Password</label>
        <input
          type="password"
          id="password"
          required
          placeholder="Your password"
        />

        <button type="submit" id="loginBtn" class="admin-login-btn">
          Sign In
        </button>

        <p id="loginStatus" class="muted admin-login-status"></p>
      </form>

      <div class="admin-login-trust">
        <span>Secure access</span>
        <span>Lead dashboard</span>
        <span>Revenue tracking</span>
      </div>
    </section>
  </main>

  <script type="module" src="admin.js?v=1"></script>
</body>
</html>
