<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead Details | ZYVERION</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-wrap">
    <div class="admin-header">
      <h1>Lead Details</h1>
      <a href="/admin/index.html" class="back-link">← Back to Dashboard</a>
    </div>

    <div class="admin-card">
      <p><strong>Name:</strong> <span id="leadName"></span></p>
      <p><strong>Email:</strong> <span id="leadEmail"></span></p>
      <p><strong>Phone:</strong> <span id="leadPhone"></span></p>
      <p><strong>Service:</strong> <span id="leadService"></span></p>
      <p><strong>Budget:</strong> <span id="leadBudget"></span></p>
      <p><strong>Timeline:</strong> <span id="leadTimeline"></span></p>
      <p><strong>Status:</strong></p>
<select id="statusSelect">
  <option value="new">new</option>
  <option value="contacted">contacted</option>
  <option value="proposal sent">proposal sent</option>
  <option value="won">won</option>
  <option value="lost">lost</option>
</select>

<div style="height:12px;"></div>

<button id="saveStatusBtn">Save Status</button>
<p id="statusMessage" class="muted"></p>
      <p><strong>Created:</strong> <span id="leadCreated"></span></p>

      <hr style="border-color:#334155; margin:20px 0;" />

      <p><strong>Message:</strong></p>
      <p id="leadMessage"></p>
    </div>

    <div class="admin-card">
      <h2>Uploaded Files</h2>
      <div id="leadFiles">No files loaded yet.</div>
    </div>
  </div>

  <script type="module" src="lead.js?v=1"></script>
</body>
</html>
